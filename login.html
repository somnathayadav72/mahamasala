<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Satyasee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-page">
        <!-- Left Visual Panel -->
        <div class="login-visual">
        <img src="images/login.png" alt="Satyasee spices — garam masala and coriander pouches with spices" class="login-visual-img">
            <div class="login-visual-overlay">
                <h2 class="login-visual-title">Welcome back</h2>
                <p class="login-visual-sub">Log in to continue your spice journey</p>
            </div>
        </div>

        <!-- Right Form Panel -->
        <div class="login-form-section">
            <div class="login-form-wrap">
                <div class="login-brand">
                    <svg class="logo-leaves" viewBox="0 0 60 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 14 Q24 6 28 8 Q26 14 22 14Z" fill="#e8734a"/>
                        <path d="M28 12 Q32 4 36 8 Q34 14 28 12Z" fill="#f4a574"/>
                        <path d="M36 12 Q38 4 42 8 Q40 14 36 12Z" fill="#7a9e6b"/>
                    </svg>
                    <h1 class="brand-name">Satyasee</h1>
                    <p class="brand-tagline">✦ ROOTED IN INDIA ✦</p>
                </div>

                <form class="login-form" id="loginForm">
                    <div class="input-group">
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <input type="text" placeholder="Email address or phone number" id="email" required>
                    </div>
                    <div class="input-group">
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </div>
                        <input type="password" placeholder="Password" id="password" required>
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <div class="form-options">
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    <div class="login-hint">
                        <strong>Demo Credentials</strong>
                        admin@satyasee.com &nbsp;/&nbsp; 12345
                    </div>
                    <button type="submit" class="login-btn">Log In</button>
                    <div class="divider">
                        <span>or continue with</span>
                    </div>
                    <div class="social-buttons">
                        <button type="button" class="social-btn">
                            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            Continue with Google
                        </button>
                        <button type="button" class="social-btn">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                            Continue with Phone
                        </button>
                    </div>
                    <p class="signup-link">New to Satyasee? <a href="#">Create Account</a> ›</p>
                </form>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // If already logged in, skip login page
        Auth.redirectIfAuthenticated();

        // Toggle password visibility
        document.querySelector('.toggle-password').addEventListener('click', function() {
            const input = document.getElementById('password');
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            // Swap icon
            this.querySelector('svg').innerHTML = isPassword
                ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
                : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        });

        // Form submit with real auth
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = this.querySelector('.login-btn');
            const errorEl = document.getElementById('loginError');

            // Clear previous errors
            if (errorEl) errorEl.remove();

            // Disable button
            btn.textContent = 'Logging in...';
            btn.disabled = true;
            btn.style.opacity = '0.7';

            // Simulate network delay
            setTimeout(() => {
                const result = Auth.login(email, password);

                if (result.success) {
                    btn.textContent = '✓ Success!';
                    btn.style.background = 'linear-gradient(135deg, #4caf50, #388e3c)';
                    setTimeout(() => {
                        window.location.href = Auth.getRedirectTarget();
                    }, 600);
                } else {
                    btn.textContent = 'Log In';
                    btn.disabled = false;
                    btn.style.opacity = '1';

                    // Show error message
                    const error = document.createElement('p');
                    error.id = 'loginError';
                    error.className = 'login-error';
                    error.textContent = result.message;
                    this.querySelector('.form-options').before(error);

                    // Shake animation
                    this.classList.add('shake');
                    setTimeout(() => this.classList.remove('shake'), 500);
                }
            }, 800);
        });
    </script>
</body>
</html>
